<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Website</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }

        header {
            background: #333;
            color: white;
            padding: 20px 0;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #00adb5;
        }

        section {
            padding: 40px 20px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #00adb5;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 15px;
        }

        footer {
            background: #222;
            color: white;
            padding: 15px 0;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to My Website</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section>
    <h2>Hello 👋</h2>
    <p>This is a simple responsive HTML starter template.</p>
    <a href="#" class="btn">Get Started</a>
</section>

<footer>
    <p>&copy; 2026 My Website | All Rights Reserved</p>
</footer>

</body>
</html>
